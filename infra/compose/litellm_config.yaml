# LiteLLM routing config — madarisse-ai
# Deux aliases : fast (Gemini Flash) et strong (Gemini Pro, fallback Claude)

model_list:
  - model_name: fast
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: strong
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
      fallbacks:
        - model: anthropic/claude-opus-4-8
          api_key: os.environ/ANTHROPIC_API_KEY

router_settings:
  routing_strategy: cost-based
  num_retries: 2
  timeout: 30

litellm_settings:
  # Logs de coût/latence (activer Langfuse en prod)
  # success_callback: ["langfuse"]
  drop_params: true   # ignore les params non supportés par certains modèles
