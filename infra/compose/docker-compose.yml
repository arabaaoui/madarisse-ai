version: '3.9'

# ── madarisse-ai — stack locale complète ──────────────────────────────────────
# Copier .env.example → .env et remplir les clés avant de lancer

services:

  # ── Front Next.js (cockpit + assistant) ────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    environment:
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AGENT_SERVICE_URL: http://agent:8001
      AGENT_SERVICE_SECRET: ${AGENT_SERVICE_SECRET}
    depends_on:
      - agent
    restart: unless-stopped

  # ── Agent service (FastAPI + ADK) ──────────────────────────────────────────
  agent:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.agent
    expose:
      - "8001"  # interne uniquement (pas exposé sur l'hôte)
    environment:
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      AGENT_SERVICE_SECRET: ${AGENT_SERVICE_SECRET}
      LITELLM_API_BASE: http://litellm:4000
      WEB_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - litellm
    restart: unless-stopped

  # ── LiteLLM proxy (routage multi-modèle) ───────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    expose:
      - "4000"  # interne uniquement
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ../../infra/compose/litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped

volumes: {}

networks:
  default:
    name: madarisse-ai-network
